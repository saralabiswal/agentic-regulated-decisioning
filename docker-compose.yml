services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: regulated_decisioning
    ports: ["${POSTGRES_PORT:-15432}:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow
    command: mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts
    ports: ["5001:5001"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001')"]
      interval: 20s
      timeout: 5s
      retries: 5
    volumes:
      - mlflow_data:/mlflow

  prometheus:
    image: prom/prometheus
    ports: ["9090:9090"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana
    ports: ["3000:3000"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - grafana_data:/var/lib/grafana

  jaeger:
    image: jaegertracing/all-in-one
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports: ["16686:16686", "4317:4317"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:16686"]
      interval: 15s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - ollama_data:/root/.ollama

volumes:
  redis_data:
  postgres_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
  ollama_data:
