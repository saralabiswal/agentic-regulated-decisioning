# Business Playbook: Lending mortgage self employed
playbook:
  name: "Mortgage - Self Employed Income Review"
  version: "1.0"
  created_by: "Credit operations"
  description: "Mortgage request requiring income stability review."

domain:
  name: lending
  case_type: mortgage

jurisdiction:
  code: US_NY

rules:
  max_auto_decision_value: 650000
  confidence_threshold: 0.8
  mandatory_review_triggers:
    - "employment_type == self_employed"
  prohibited_factors:
    - age

submission:
  annual_income: 164000
  employment_type: self_employed
  monthly_debt_obligations: 4800
  requested_loan_amount: 590000
  property_value: 780000
  down_payment: 190000
  reserves_months: 9
